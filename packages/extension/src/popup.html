<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 310px; margin: 0; padding: 16px; background: #0d1117;
         color: #c9d1d9; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  h1 { font-size: 14px; margin: 0 0 4px; color: #e6edf3; }
  h1 img { vertical-align: -3px; margin-right: 6px; }
  .dim { color: #8b949e; }
  .row { margin-top: 10px; }
  a { color: #58a6ff; text-decoration: none; cursor: pointer; }
  #here { display: none; padding: 10px; border: 1px solid #30363d; border-radius: 8px; }
  #here .site { color: #e6edf3; font-weight: bold; }
  .seg { display: flex; gap: 6px; margin-top: 8px; }
  .seg button { flex: 1; background: #161b22; color: #8b949e; border: 1px solid #30363d;
                border-radius: 6px; padding: 5px 0; font: inherit; cursor: pointer; }
  .seg button.active { background: #1a7f37; color: #fff; border-color: #1a7f37; }
  .seg button.active[data-mode="off"] { background: #da3633; border-color: #da3633; }
  #ledger { padding: 10px; border: 1px solid #21262d; border-radius: 8px; background: #161b22; }
  .big { color: #3fb950; font-weight: bold; font-size: 15px; }
  .sites-mini { margin-top: 6px; }
  .foot { display: flex; gap: 12px; margin-top: 12px; font-size: 12px; }
</style>
</head>
<body>
  <h1><img src="../icons/icon16.png" width="16" alt=""> iamtoolazy</h1>
  <div class="dim" id="version"></div>

  <div class="row" id="here">
    <span class="site"></span>
    <div class="seg">
      <button data-mode="preview">preview</button>
      <button data-mode="auto">auto</button>
      <button data-mode="off">off</button>
    </div>
    <button id="distill" style="width:100%;margin-top:8px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 0;font:inherit;cursor:pointer">🧵 Distill this thread</button>
    <div class="dim" style="margin-top:6px;font-size:11px">Puts a distill request in the chat box — send it, then paste the brief into a fresh chat to keep going with a tiny context.</div>
  </div>

  <div class="row" id="ledger">
    <div id="totals" class="dim">no savings recorded yet — press <b class="kbd-combo">Alt+L</b> in a chat box</div>
    <div class="sites-mini dim" id="persite"></div>
    <div class="dim" style="margin-top:6px">all numbers are estimates (chars/4) ·
      <a id="reset">reset</a></div>
  </div>

  <div class="row dim" id="hint"></div>

  <div class="foot">
    <a id="opt">Options</a>
    <a id="guide">Setup guide</a>
    <a href="https://github.com/MRLNT/iamtoolazy" target="_blank">GitHub</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
