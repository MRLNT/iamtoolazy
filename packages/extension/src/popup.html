<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 300px; margin: 0; padding: 16px; background: #0d1117;
         color: #c9d1d9; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  h1 { font-size: 14px; margin: 0 0 4px; color: #e6edf3; }
  h1 img { vertical-align: -3px; margin-right: 6px; }
  .dim { color: #8b949e; }
  .row { margin-top: 10px; }
  a { color: #58a6ff; text-decoration: none; }
  #here { display: none; padding: 10px; border: 1px solid #30363d; border-radius: 8px; }
  #here .site { color: #e6edf3; font-weight: bold; }
  .seg { display: flex; gap: 6px; margin-top: 8px; }
  .seg button { flex: 1; background: #161b22; color: #8b949e; border: 1px solid #30363d;
                border-radius: 6px; padding: 5px 0; font: inherit; cursor: pointer; }
  .seg button.active { background: #1a7f37; color: #fff; border-color: #1a7f37; }
</style>
</head>
<body>
  <h1><img src="../icons/icon16.png" width="16" alt=""> iamtoolazy</h1>
  <div class="dim" id="version"></div>
  <div class="row" id="here">
    <span class="site"></span>
    <div class="seg">
      <button data-mode="preview">preview</button>
      <button data-mode="auto">auto</button>
      <button data-mode="off">off</button>
    </div>
  </div>
  <div class="row" id="modes"></div>
  <div class="row">Press <b>⌥L</b> (Alt+L) in the chat box to compress your prompt in place.</div>
  <div class="row dim">The honest ledger moves in here in Fase 3.D.</div>
  <div class="row"><a href="https://github.com/MRLNT/iamtoolazy" target="_blank">github.com/MRLNT/iamtoolazy</a></div>
  <script src="popup.js"></script>
</body>
</html>
